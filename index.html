<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIシステム診断</title>
    <style>
        body { background: #080810; color: #00ffaa; font-family: monospace; padding: 20px; line-height: 1.5; }
        .log-box { border: 1px solid #1a1a30; background: #0f0f1a; padding: 15px; border-radius: 8px; min-height: 200px; margin-top: 10px; white-space: pre-wrap; font-size: 13px; }
        .error { color: #ff3366; font-weight: bold; }
        .success { color: #00ffaa; }
        h2 { font-size: 1.2rem; margin-bottom: 5px; }
        button { background: #00ffaa; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>AIシステム起動テスト</h2>
    <div id="status">⏳ 診断を開始します...</div>
    <div id="log" class="log-box"></div>
    <button onclick="location.reload()">再試行</button>

    <script>
        const logBox = document.getElementById('log');
        function addLog(msg, isError = false) {
            const span = document.createElement('div');
            span.className = isError ? 'error' : 'success';
            span.innerHTML = `> ${msg}`;
            logBox.appendChild(span);
        }
        window.onerror = function(e) { addLog("システムエラー: " + e, true); };
    </script>

    <script src="./edge-impulse-standalone.js" onload="addLog('edge-impulse-standalone.js 読み込み成功')" onerror="addLog('edge-impulse-standalone.js が見つかりません', true)"></script>
    <script src="./run-impulse.js" onload="addLog('run-impulse.js 読み込み成功')" onerror="addLog('run-impulse.js が見つかりません', true)"></script>

    <script>
        window.onload = async () => {
            addLog("ページ全体のロード完了");
            const status = document.getElementById('status');

            try {
                addLog("EdgeImpulseClassifier の確認中...");
                if (typeof EdgeImpulseClassifier === 'undefined') {
                    throw new Error("AIエンジンのクラスが見つかりません。JSファイルが正しく読み込まれていない可能性があります。");
                }
                addLog("EdgeImpulseClassifier を発見");

                addLog("エンジンの初期化 (WASM) を開始...");
                const classifier = new EdgeImpulseClassifier();
                
                // 3秒でタイムアウト設定（フリーズ対策）
                const initPromise = classifier.init();
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("初期化がタイムアウトしました。メモリ不足かWASM非対応の可能性があります。")), 5000)
                );

                await Promise.race([initPromise, timeoutPromise]);
                
                addLog("✅ エンジンの初期化に成功しました！");
                status.innerHTML = "🎉 正常に起動しました！";
                
                const project = classifier.getProjectInfo();
                addLog(`モデル名: ${project.name} (v${project.deploy_version})`);

            } catch (e) {
                addLog("❌ 停止原因: " + e.message, true);
                status.innerHTML = "⚠️ 起動に失敗しました";
                console.error(e);
            }
        };
    </script>
</body>
</html>
