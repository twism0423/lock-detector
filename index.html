<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LOCK DETECTOR FINAL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    body { background: #05050a; color: #d0d0e8; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: #0f0f1f; border: 1px solid #1a1a30; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 10px; }
    h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: #00ffaa; margin-bottom: 20px; letter-spacing: 2px; }
    .val-box { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
    canvas { width: 100%; height: 60px; background: #000; border-radius: 4px; }
    .res-row { margin-top: 15px; background: #151525; padding: 10px; border-radius: 8px; }
    .bar-bg { height: 12px; background: #000; border-radius: 6px; margin-top: 5px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; transition: width 0.1s linear; background: #00ffaa; }
    .btn { width: 100%; max-width: 400px; padding: 18px; border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; background: #00ffaa; color: #000; margin-top: 10px; font-size: 1rem; }
    .btn.stop { background: #ff3366; color: #fff; }
  </style>
  <script src="./edge-impulse-standalone.js"></script>
  <script src="./run-impulse.js"></script>
</head>
<body>
  <h1>LOCK DETECTOR</h1>
  
  <div class="card">
    <div style="font-size: 0.6rem; color: #4a4a70;">INPUT LEVEL / WAVEFORM</div>
    <div id="peakVal" class="val-box">0.0000</div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="card">
    <div style="font-size: 0.6rem; color: #4a4a70;">AI CLASSIFICATION</div>
    <div class="res-row">
      <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.8rem;">
        <span>LOCK</span><span id="txt-lock">0.0%</span>
      </div>
      <div class="bar-bg"><div id="bar-lock" class="bar-fill"></div></div>
    </div>
    <div class="res-row">
      <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.8rem;">
        <span>NOISE</span><span id="txt-noise">0.0%</span>
      </div>
      <div class="bar-bg"><div id="bar-noise" class="bar-fill" style="background:#ff3366;"></div></div>
    </div>
  </div>

  <button id="mainBtn" class="btn" onclick="toggle()" disabled>INITIALIZING...</button>

<script>
let classifier, audioCtx, analyser, processor, sampleBuf = [];
let isReady = false, isRecording = false;

window.onload = async () => {
    try {
        classifier = new EdgeImpulseClassifier();
        await classifier.init();
        isReady = true;
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = 'START';
    } catch (e) { alert("Engine Error: " + e.message); }
};

async function toggle() {
    if (!isReady) return;
    if (isRecording) {
        isRecording = false;
        document.getElementById('mainBtn').innerText = 'START';
        document.getElementById('mainBtn').classList.remove('stop');
        if (audioCtx) audioCtx.close();
    } else {
        await start();
    }
}

async function start() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        
        source.connect(analyser);
        processor.connect(audioCtx.destination);
        source.connect(processor);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            let peak = 0;
            for (let i = 0; i < input.length; i++) {
                // ここが重要：音声を16ビット相当（32768倍）にスケールアップしてAIに渡す
                sampleBuf.push(input[i] * 32768);
                if (Math.abs(input[i]) > peak) peak = Math.abs(input[i]);
            }
            document.getElementById('peakVal').innerText = peak.toFixed(4);

            if (sampleBuf.length >= 16000) {
                const raw = sampleBuf.slice(-16000);
                sampleBuf.splice(0, 4000); 

                // 推論実行
                const res = classifier.classify(new Float32Array(raw));
                
                const results = res.results || res.classification;
                if (results) {
                    results.forEach(r => {
                        const label = r.label.toLowerCase();
                        const val = (r.value * 100).toFixed(1);
                        if (label.includes('lock')) {
                            document.getElementById('bar-lock').style.width = val + '%';
                            document.getElementById('txt-lock').innerText = val + '%';
                        } else if (label.includes('noise')) {
                            document.getElementById('bar-noise').style.width = val + '%';
                            document.getElementById('txt-noise').innerText = val + '%';
                        }
                    });
                }
            }
        };
        isRecording = true;
        document.getElementById('mainBtn').innerText = 'STOP';
        document.getElementById('mainBtn').classList.add('stop');
        draw();
    } catch (e) { alert(e.message); }
}

function draw() {
    if (!isRecording) return;
    requestAnimationFrame(draw);
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const data = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);
    ctx.fillStyle = '#0f0f1f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#00ffaa'; ctx.lineWidth = 1.5; ctx.beginPath();
    const step = canvas.width / data.length;
    for (let i = 0; i < data.length; i++) {
        const x = i * step;
        const y = (data[i] + 1) / 2 * canvas.height;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
