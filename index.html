<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL DEBUG</title>
    <style>
        body { background: blue; color: white; font-family: monospace; padding: 20px; }
        .log-area { background: #000; color: #0f0; height: 400px; overflow: auto; padding: 10px; border: 2px solid white; font-size: 12px; }
        .btn { width: 100%; padding: 25px; font-size: 20px; font-weight: bold; background: #ff00ff; color: white; border: none; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h1>【青：最終診断画面】</h1>
    <button id="startBtn" class="btn" onclick="run()">1. マイクとエンジンを起動</button>
    <div id="log" class="log-area">ここに全工程を記録します...<br></div>

<script>
    let classifier, sampleBuf = [];
    const log = (msg) => { 
        const d = new Date();
        const time = `${d.getSeconds()}.${d.getMilliseconds()}`;
        document.getElementById('log').innerHTML += `[${time}] ${msg}<br>`; 
    };

    async function run() {
        document.getElementById('startBtn').disabled = true;
        log("▶️ 処理開始...");

        try {
            // 1. マイクの準備
            const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = ctx.createMediaStreamSource(stream);
            const processor = ctx.createScriptProcessor(4096, 1, 1);
            source.connect(processor); processor.connect(ctx.destination);
            log("🎤 マイク接続成功");

            // 2. エンジンの準備（ここで止まらないようにエラーを監視）
            log("⚙️ AIエンジン読み込み中...");
            classifier = new EdgeImpulseClassifier();
            
            // iPad Safariでフリーズしやすい箇所
            await classifier.init().catch(e => log("❌ エンジン初期化失敗: " + e));
            log("✅ AIエンジン準備完了！");

            processor.onaudioprocess = async (e) => {
                const input = e.inputBuffer.getChannelData(0);
                for (let i = 0; i < input.length; i++) sampleBuf.push(input[i]);

                if (sampleBuf.length >= 16000) {
                    const raw = sampleBuf.slice(-16000);
                    sampleBuf = [];
                    
                    // classifyは非同期(Promise)なので、必ずawaitで待つ
                    try {
                        const res = await classifier.classify(raw);
                        const data = res.results || res.classification || res;
                        log("判定成功 ➔ " + JSON.stringify(data));
                    } catch (err) {
                        log("❌ 判定エラー: " + err);
                    }
                }
            };
        } catch (e) {
            log("❌ 全体エラー: " + e.message);
        }
    }
</script>
</body>
</html>
