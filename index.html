<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Impulse - iPad Fix</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; padding: 12px; font-size: 12px; }
        h2 { color: #58a6ff; }
        .status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; margin: 8px 0; font-size: 11px; }
        .status-bar span { color: #58a6ff; font-weight: bold; }
        .log { background: #0d1117; color: #3fb950; height: 380px; overflow-y: auto; padding: 10px;
               border: 1px solid #238636; border-radius: 6px; margin-top: 8px; }
        .log .err  { color: #f85149; }
        .log .warn { color: #d29922; }
        .log .good { color: #3fb950; }
        .log .result { color: #79c0ff; font-weight: bold; }
        .btn { width: 100%; padding: 22px; font-size: 17px; font-weight: bold;
               background: #238636; color: white; border: none; border-radius: 8px;
               cursor: pointer; transition: background 0.2s; }
        .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        .btn.recording { background: #da3633; }
        .meter { height: 8px; background: #21262d; border-radius: 4px; margin-top: 6px; overflow: hidden; }
        .meter-fill { height: 100%; width: 0%; background: #3fb950; transition: width 0.1s; border-radius: 4px; }
    </style>

    <!--
        ⚠️ iPad Safariキャッシュ対策:
        GitHub Pagesのキャッシュを強制バイパスするため、
        実運用では以下のようにバージョンクエリを付けてください:
        <script src="./edge-impulse-standalone.js?v=20240601"></script>
    -->
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h2>Edge Impulse Classifier</h2>

    <div class="status-bar">
        AudioContext SR: <span id="sr-display">---</span> Hz　/
        実効SR: <span id="eff-sr-display">---</span> Hz　/
        状態: <span id="state-display">初期化中</span>
    </div>

    <button id="btn" class="btn" onclick="startRecording()" disabled>
        AIエンジン読み込み中...
    </button>

    <div class="meter"><div class="meter-fill" id="meter"></div></div>

    <div id="log" class="log">ログ開始...<br></div>

<script>
// ============================================================
// 設定値 — Edge Impulseのプロジェクト設定に合わせてください
// ============================================================
const MODEL_SAMPLE_RATE   = 16000;  // Edge Impulseプロジェクトのサンプルレート
const MODEL_WINDOW_SIZE   = 16000;  // 推論に使うサンプル数 (= 1秒 × SR)
const SLIDE_OVERLAP_RATIO = 0.5;    // スライドウィンドウのオーバーラップ率
const SCRIPT_PROC_BUFFER  = 4096;   // ScriptProcessorバッファサイズ

// ============================================================
// ユーティリティ
// ============================================================
const $ = id => document.getElementById(id);

function log(msg, cls = 'good') {
    const box = $('log');
    const t   = new Date().toLocaleTimeString('ja-JP', { hour12: false });
    box.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
    box.scrollTop  = box.scrollHeight;
}

/** Float32 [-1,1] → Int16 [-32768,32767] */
function float32ToInt16(buf) {
    const out = new Int16Array(buf.length);
    for (let i = 0; i < buf.length; i++) {
        const s = Math.max(-1, Math.min(1, buf[i]));
        out[i]  = s < 0 ? s * 32768 : s * 32767;
    }
    return out;
}

/**
 * 線形補間によるダウンサンプリング
 * Safari は sampleRate:16000 を無視して 44100/48000 Hz で動くため必須
 */
function resample(input, fromSR, toSR) {
    if (fromSR === toSR) return input;
    const ratio  = fromSR / toSR;
    const outLen = Math.round(input.length / ratio);
    const output = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
        const pos  = i * ratio;
        const idx  = Math.floor(pos);
        const frac = pos - idx;
        output[i]  = (idx + 1 < input.length)
            ? input[idx] * (1 - frac) + input[idx + 1] * frac
            : input[idx];
    }
    return output;
}

// ============================================================
// グローバル状態
// ============================================================
let classifier       = null;
let audioCtx         = null;
let actualSampleRate = MODEL_SAMPLE_RATE;
let sampleBuf        = [];          // Float32生バッファ（実機SR）
let isClassifying    = false;       // 推論中フラグ（多重実行防止）
let isRecording      = false;

// ============================================================
// 初期化
// ============================================================
window.addEventListener('load', async () => {
    log("▶ EdgeImpulseClassifier 初期化開始...");
    try {
        classifier = new EdgeImpulseClassifier();
        await classifier.init();

        // モデルのプロパティを取得（あれば）
        let props = {};
        if (typeof classifier.getProperties === 'function') {
            props = classifier.getProperties();
        }
        log("✅ 初期化成功 props=" + JSON.stringify(props));

        // ラベル一覧を事前確認（後の推論結果パース用）
        if (props.label_count || props.labels) {
            log("ラベル: " + (props.labels || []).join(', '));
        }

        $('btn').disabled  = false;
        $('btn').innerText = '🎤 録音開始';
        $('state-display').textContent = '待機中';
    } catch (e) {
        log("❌ 初期化失敗: " + e.message, 'err');
        log("スタック: " + (e.stack || '—'), 'err');
    }
});

// ============================================================
// 録音開始（ユーザー操作から呼ぶ必要あり ← Safari要件）
// ============================================================
async function startRecording() {
    if (isRecording) return;

    try {
        log("▶ AudioContext 作成中...");

        // 【Safari Fix 1】
        // sampleRate オプションを渡すと Safari が固まることがあるため
        // ここでは指定しない → 実際のSRを確認してソフトウェアリサンプルする
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 【Safari Fix 2】
        // ユーザー操作直後でも suspended になることがある
        if (audioCtx.state === 'suspended') {
            log("AudioContext が suspended → resume() 実行", 'warn');
            await audioCtx.resume();
        }

        actualSampleRate = audioCtx.sampleRate;
        $('sr-display').textContent     = actualSampleRate;
        $('eff-sr-display').textContent = MODEL_SAMPLE_RATE;
        log(`AudioContext SR: ${actualSampleRate} Hz (モデル要求: ${MODEL_SAMPLE_RATE} Hz)`);

        if (actualSampleRate !== MODEL_SAMPLE_RATE) {
            log(`⚠️ SRミスマッチ → リサンプリング有効`, 'warn');
        }

        // マイク取得
        // 【Safari Fix 3】getUserMedia の audio 制約は最小限にする
        // echoCancellation 等を false にすると Safari で失敗する端末がある
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        log("✅ マイクアクセス成功");

        const source    = audioCtx.createMediaStreamSource(stream);
        const processor = audioCtx.createScriptProcessor(SCRIPT_PROC_BUFFER, 1, 1);

        // 実機SRで「1秒分」に相当するサンプル数
        const targetBufSamples = Math.round(MODEL_WINDOW_SIZE * actualSampleRate / MODEL_SAMPLE_RATE);
        const slideStep        = Math.round(targetBufSamples * (1 - SLIDE_OVERLAP_RATIO));
        log(`バッファ目標: ${targetBufSamples} smp / スライド幅: ${slideStep} smp`);

        processor.onaudioprocess = (e) => {
            const chunk = e.inputBuffer.getChannelData(0);

            // レベルメーター更新（軽量）
            let peak = 0;
            for (let i = 0; i < chunk.length; i++) {
                const a = Math.abs(chunk[i]);
                if (a > peak) peak = a;
            }
            $('meter').style.width = Math.min(100, peak * 100 * 3) + '%';

            // バッファ蓄積
            for (let i = 0; i < chunk.length; i++) sampleBuf.push(chunk[i]);

            // 1秒分たまったら推論（推論中は重複しない）
            if (sampleBuf.length >= targetBufSamples && !isClassifying) {
                const window = new Float32Array(sampleBuf.slice(0, targetBufSamples));
                sampleBuf    = sampleBuf.slice(slideStep); // スライド

                // 【Safari Fix 4】
                // onaudioprocess 内で重い処理をすると
                // オーディオスレッドが詰まりUIに反映されない
                // → setTimeout(0) でメインスレッドに委ねる
                setTimeout(() => runInference(window), 0);
            }
        };

        source.connect(processor);
        processor.connect(audioCtx.destination);

        isRecording           = true;
        $('btn').innerText    = '🔴 録音中...';
        $('btn').classList.add('recording');
        $('state-display').textContent = '録音中';
        log("🎤 監視開始（1秒窓 / " + Math.round(SLIDE_OVERLAP_RATIO * 100) + "% オーバーラップ）");

    } catch (e) {
        log("❌ 録音エラー: " + e.message, 'err');
        log(e.stack || '', 'err');
    }
}

// ============================================================
// 推論実行（メインスレッド側）
// ============================================================
async function runInference(rawChunk /* Float32Array @ actualSampleRate */) {
    isClassifying = true;
    try {
        // ① リサンプリング（必要な場合）
        const resampled = resample(rawChunk, actualSampleRate, MODEL_SAMPLE_RATE);

        const maxVal = Math.max(...resampled.map(Math.abs));
        log(`推論開始 [${resampled.length} smp, peak=${maxVal.toFixed(4)}]`);

        if (maxVal < 0.001) {
            log("⚠️ 入力がほぼ無音 — マイク入力を確認してください", 'warn');
        }

        // ② classify() を呼ぶ
        //    Edge Impulse WASM は Float32Array (-1〜1) を受け付ける
        //    それでも 0% が続く場合は Int16 に変換して渡す（下の代替パスを有効化）
        let res;
        try {
            res = classifier.classify(resampled);
        } catch (e1) {
            log("Float32で失敗 → Int16に変換して再試行: " + e1.message, 'warn');
            const int16 = float32ToInt16(resampled);
            res = classifier.classify(int16);
        }

        // ③ 結果パース（SDK バージョンにより構造が異なる）
        log("RAW結果: " + JSON.stringify(res), 'result');

        const results =
            res?.results          ??  // 新SDK: { results: [{label, value}] }
            res?.classification   ??  // 旧SDK: { classification: {LOCK:0.9,...} }
            null;

        if (Array.isArray(results)) {
            // 新SDK形式
            results.forEach(r => {
                const bar = '█'.repeat(Math.round(r.value * 20));
                log(`  ${r.label.padEnd(10)} ${(r.value * 100).toFixed(1).padStart(5)}% ${bar}`, 'result');
            });
        } else if (results && typeof results === 'object') {
            // 旧SDK形式（オブジェクト）
            Object.entries(results).forEach(([label, value]) => {
                const bar = '█'.repeat(Math.round(value * 20));
                log(`  ${label.padEnd(10)} ${(value * 100).toFixed(1).padStart(5)}% ${bar}`, 'result');
            });
        } else {
            log("⚠️ 結果形式が不明: " + JSON.stringify(res), 'warn');
        }

        $('state-display').textContent = '推論完了';

    } catch (e) {
        log("❌ 推論エラー: " + e.message, 'err');
        log(e.stack || '', 'err');
    } finally {
        isClassifying = false;
    }
}
</script>
</body>
</html>
