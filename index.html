<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BOOT CHECK</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
        .log-box { background: #111; border: 1px solid #333; height: 450px; overflow: auto; padding: 10px; font-size: 11px; margin-top: 10px; }
        .btn { width: 100%; padding: 25px; font-size: 18px; font-weight: bold; background: #222; color: #555; border: 1px solid #444; }
        .btn.ready { background: #0f0; color: #000; border: none; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h2 id="title">AI 起動ステータス</h2>
    <button id="btn" class="btn" onclick="run()" disabled>AIエンジン起動を待機中...</button>
    <div id="log" class="log-box"></div>

<script>
    const log = (m) => { document.getElementById('log').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; };
    let classifier, isInitialized = false;

    // ページ読み込みと同時に初期化を強制
    window.addEventListener('load', async () => {
        log("1. システム開始...");
        try {
            if (typeof EdgeImpulseClassifier === 'undefined') {
                throw new Error("JSファイルが読み込めていません。");
            }
            classifier = new EdgeImpulseClassifier();
            log("2. WASMロード開始（これに時間がかかる場合があります）...");
            
            // 初期化を待つ
            await classifier.init();
            
            isInitialized = true;
            log("3. ✅ AIエンジン起動成功！");
            
            const btn = document.getElementById('btn');
            btn.disabled = false;
            btn.innerText = "マイク録音開始";
            btn.className = "btn ready";
            document.getElementById('title').innerText = "AI 準備完了";
            document.getElementById('title').style.color = "#0f0";
        } catch (e) {
            log("❌ 初期化エラー: " + e.message);
            log("※WASMファイルが存在するか、パスが正しいか確認してください。");
        }
    });

    async function run() {
        if (!isInitialized) {
            log("❌ まだ準備ができていません。");
            return;
        }
        log("4. マイク使用許可をリクエスト中...");
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = ctx.createMediaStreamSource(stream);
            const processor = ctx.createScriptProcessor(4096, 1, 1);
            source.connect(processor); processor.connect(ctx.destination);

            let buffer = [];
            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                for (let i = 0; i < input.length; i++) buffer.push(input[i]);

                if (buffer.length >= 16000) {
                    const data = new Float32Array(buffer.slice(0, 16000));
                    buffer = buffer.slice(4000); 
                    try {
                        const res = classifier.classify(data);
                        log("🎉 判定結果: " + JSON.stringify(res.results || res.classification));
                    } catch (err) {
                        log("❌ 推論エラー: " + err.message);
                    }
                }
            };
            log("5. 🎤 リアルタイム判定中...");
            document.getElementById('btn').style.display = "none";
        } catch (e) { log("❌ マイクエラー: " + e.message); }
    }
</script>
</body>
</html>
