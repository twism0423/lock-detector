<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LOCK DETECTOR DEBUG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    body { background: #05050a; color: #d0d0e8; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: #0f0f1f; border: 1px solid #1a1a30; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 10px; }
    h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: #00ffaa; margin-bottom: 20px; letter-spacing: 2px; }
    .val-box { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
    canvas { width: 100%; height: 60px; background: #000; border-radius: 4px; }
    .res-list { margin-top: 10px; }
    .res-item { background: #151525; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #00ffaa; }
    .res-label { font-family: 'Orbitron'; font-size: 0.9rem; display: flex; justify-content: space-between; }
    .res-bar-bg { height: 8px; background: #000; border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .res-bar-fill { height: 100%; background: #00ffaa; transition: width 0.1s linear; }
    .btn { width: 100%; max-width: 400px; padding: 20px; border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; background: #00ffaa; color: #000; font-size: 1.1rem; margin-top: 10px; }
    .btn.stop { background: #ff3366; color: #fff; }
    .debug-log { font-size: 0.6rem; color: #4a4a70; margin-top: 10px; text-align: center; }
  </style>
  <script src="./edge-impulse-standalone.js"></script>
  <script src="./run-impulse.js"></script>
</head>
<body>
  <h1>LOCK DETECTOR</h1>
  
  <div class="card">
    <div style="font-size: 0.6rem; color: #505080;">INPUT PEAK</div>
    <div id="peakVal" class="val-box">0.0000</div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="card">
    <div style="font-size: 0.6rem; color: #505080;">AI CLASSIFICATION RESULTS</div>
    <div id="resultContainer" class="res-list">
      <div style="color:#4a4a70; font-size:0.7rem;">Waiting for inference...</div>
    </div>
  </div>

  <button id="mainBtn" class="btn" onclick="toggle()" disabled>INITIALIZING...</button>
  <div id="debugStatus" class="debug-log">Engine Loading...</div>

<script>
let classifier, audioCtx, analyser, processor, sampleBuf = [];
let isReady = false, isRecording = false;

window.onload = async () => {
    try {
        classifier = new EdgeImpulseClassifier();
        await classifier.init();
        isReady = true;
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = 'START MONITORING';
        document.getElementById('debugStatus').innerText = 'System Ready';
    } catch (e) {
        document.getElementById('debugStatus').innerText = 'Error: ' + e.message;
    }
};

async function toggle() {
    if (!isReady) return;
    if (isRecording) {
        isRecording = false;
        document.getElementById('mainBtn').innerText = 'START MONITORING';
        document.getElementById('mainBtn').classList.remove('stop');
        if (audioCtx) audioCtx.close();
    } else {
        await start();
    }
}

async function start() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        
        source.connect(analyser);
        processor.connect(audioCtx.destination);
        source.connect(processor);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            let peak = 0;
            for (let i = 0; i < input.length; i++) {
                sampleBuf.push(input[i]);
                if (Math.abs(input[i]) > peak) peak = Math.abs(input[i]);
            }
            document.getElementById('peakVal').innerText = peak.toFixed(4);

            if (sampleBuf.length >= 16000) {
                const raw = sampleBuf.slice(-16000);
                sampleBuf.splice(0, 4000); // 0.25秒分を消化

                try {
                    const res = classifier.classify(new Float32Array(raw));
                    if (res && res.results) {
                        updateUI(res.results);
                    }
                } catch (err) { console.error(err); }
            }
        };

        isRecording = true;
        document.getElementById('mainBtn').innerText = 'STOP';
        document.getElementById('mainBtn').classList.add('stop');
        draw();
    } catch (e) { alert("Mic Error: " + e.message); }
}

function updateUI(results) {
    const container = document.getElementById('resultContainer');
    container.innerHTML = ''; // 一旦クリア

    results.forEach(r => {
        const pct = (r.value * 100).toFixed(1);
        const item = document.createElement('div');
        item.className = 'res-item';
        // LOCKという文字が含まれるラベルだけ色を変える（大文字小文字無視）
        if (r.label.toUpperCase().includes('LOCK')) {
            item.style.borderLeftColor = '#00ffaa';
        } else {
            item.style.borderLeftColor = '#ff3366';
        }

        item.innerHTML = `
            <div class="res-label">
                <span>${r.label.toUpperCase()}</span>
                <span>${pct}%</span>
            </div>
            <div class="res-bar-bg">
                <div class="res-bar-fill" style="width: ${pct}%; background: ${item.style.borderLeftColor};"></div>
            </div>
        `;
        container.appendChild(item);
    });
}

function draw() {
    if (!isRecording) return;
    requestAnimationFrame(draw);
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const data = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);
    ctx.fillStyle = '#0f0f1f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#00ffaa'; ctx.lineWidth = 1.5; ctx.beginPath();
    const step = canvas.width / data.length;
    for (let i = 0; i < data.length; i++) {
        const x = i * step;
        const y = (data[i] + 1) / 2 * canvas.height;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
