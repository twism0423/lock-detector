<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LOCK DETECTOR PRO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    :root { --bg: #05050a; --accent: #00ffaa; --warn: #ff3366; --panel: #0f0f1f; --text: #d0d0e8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    .container { width: 100%; max-width: 400px; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent); text-align: center; margin-bottom: 20px; letter-spacing: 3px; }
    .monitor { background: var(--panel); border: 1px solid #1a1a30; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .label { font-size: 0.6rem; color: #505080; margin-bottom: 5px; letter-spacing: 1px; }
    canvas { width: 100%; height: 60px; background: #000; border-radius: 6px; margin-top: 10px; }
    .results { display: flex; flex-direction: column; gap: 10px; }
    .res-row { background: var(--panel); padding: 12px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #1a1a30; }
    .res-bar { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); opacity: 0.2; transition: width 0.1s linear; }
    .res-info { position: relative; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.9rem; }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-family: 'Orbitron'; background: var(--accent); color: #000; font-weight: bold; margin-top: 20px; font-size: 1rem; }
    .btn.stop { background: var(--warn); color: #fff; }
    .status-bar { font-size: 0.65rem; color: #4a4a70; margin-top: 15px; text-align: center; font-family: 'Orbitron'; }
  </style>
  <script src="./edge-impulse-standalone.js"></script>
  <script src="./run-impulse.js"></script>
</head>
<body>
  <div class="container">
    <h1>LOCK DETECTOR</h1>
    
    <div class="monitor">
      <div class="label">LIVE WAVEFORM</div>
      <canvas id="waveCanvas"></canvas>
    </div>

    <div id="results" class="results">
      <div class="res-row"><div class="res-info"><span>WAITING...</span><span>--%</span></div></div>
    </div>

    <button id="mainBtn" class="btn" onclick="toggle()" disabled>INITIALIZING...</button>
    <div id="status" class="status-bar">LOADING AI ENGINE...</div>
  </div>

<script>
let classifier, audioCtx, analyser, processor, sampleBuf = [];
let isReady = false, isRecording = false;

window.onload = async () => {
  try {
    classifier = new EdgeImpulseClassifier();
    await classifier.init();
    isReady = true;
    document.getElementById('mainBtn').disabled = false;
    document.getElementById('mainBtn').innerText = 'START';
    document.getElementById('status').innerText = 'AI ENGINE READY';
  } catch (e) {
    document.getElementById('status').innerText = 'ERROR: ' + e.message;
  }
};

async function toggle() {
  if (!isReady) return;
  isRecording ? stop() : await start();
}

async function start() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    
    source.connect(analyser);
    processor.connect(audioCtx.destination);
    source.connect(processor);

    processor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      for (let i = 0; i < input.length; i++) {
        sampleBuf.push(input[i]);
      }

      // 1秒分(16000個)のデータを保持しつつ、新しいデータが入るたびに推論
      if (sampleBuf.length >= 16000) {
        const raw = sampleBuf.slice(-16000);
        sampleBuf.splice(0, input.length); // 古いデータを削除

        // WASMエンジンへFloat32Array形式で渡す
        const inferenceData = new Float32Array(raw);
        try {
          const res = classifier.classify(inferenceData);
          if (res && res.results) updateUI(res.results);
        } catch (err) { console.error(err); }
      }
    };

    isRecording = true;
    document.getElementById('mainBtn').innerText = 'STOP';
    document.getElementById('mainBtn').className = 'btn stop';
    document.getElementById('status').innerText = 'MONITORING...';
    draw();
  } catch (e) { alert("Mic Error: " + e.message); }
}

function stop() {
  isRecording = false;
  if (audioCtx) audioCtx.close();
  document.getElementById('mainBtn').innerText = 'START';
  document.getElementById('mainBtn').className = 'btn';
  document.getElementById('status').innerText = 'AI ENGINE READY';
}

function updateUI(results) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  
  // 結果を確信度順にソート
  results.sort((a, b) => b.value - a.value);

  results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'res-row';
    const pct = (r.value * 100).toFixed(1);
    const color = (r.label.toLowerCase().includes('lock') && r.value > 0.7) ? 'var(--accent)' : 'rgba(255,255,255,0.1)';
    
    row.innerHTML = `
      <div class="res-bar" style="width: ${pct}%; background: ${color}"></div>
      <div class="res-info">
        <span style="color: ${pct > 70 ? '#fff' : 'var(--text)'}">${r.label.toUpperCase()}</span>
        <span>${pct}%</span>
      </div>
    `;
    container.appendChild(row);
  });
}

function draw() {
  if (!isRecording) return;
  requestAnimationFrame(draw);
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  ctx.fillStyle = '#05050a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#00ffaa'; ctx.lineWidth = 1.5; ctx.beginPath();
  const step = canvas.width / data.length;
  for (let i = 0; i < data.length; i++) {
    const x = i * step;
    const y = (data[i] + 1) / 2 * canvas.height;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}
</script>
</body>
</html>
