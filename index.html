<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL CHECK</title>
    <style>
        /* 反映されたか一目でわかるよう、背景を警告の黄色にします */
        body { background: yellow; color: black; font-family: monospace; padding: 20px; }
        .log-area { background: white; border: 2px solid black; height: 300px; overflow: auto; padding: 10px; margin-top: 20px; }
        .btn { width: 100%; padding: 20px; font-size: 20px; font-weight: bold; background: red; color: white; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h1>【最終確認画面】</h1>
    <p>この画面が「黄色」なら、最新のコードが反映されています。</p>
    
    <button id="startBtn" class="btn" onclick="run()" disabled>AIエンジン起動中...</button>

    <div id="log" class="log-area">ここにAIの生データを全て出します...</div>

<script>
    let classifier, sampleBuf = [];
    const log = (msg) => { document.getElementById('log').innerHTML += `<div>${msg}</div>`; };

    window.onload = async () => {
        try {
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "マイク開始";
            log("✅ AIエンジン準備完了");
        } catch (e) { log("❌ エラー: " + e.message); }
    };

    async function run() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = ctx.createMediaStreamSource(stream);
        const processor = ctx.createScriptProcessor(4096, 1, 1);
        source.connect(processor); processor.connect(ctx.destination);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            for (let i = 0; i < input.length; i++) sampleBuf.push(input[i]);

            if (sampleBuf.length >= 16000) {
                const raw = sampleBuf.slice(-16000);
                sampleBuf = [];
                const res = classifier.classify(raw);
                // AIが返してきた生データをそのまま文字として出す
                log("判定結果: " + JSON.stringify(res.results || res.classification));
            }
        };
        log("🎤 マイク入力中...");
    }
</script>
</body>
</html>
