<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lock Detector v6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;600&display=swap');
  :root{
    --bg:#080c10;--surface:#0e1419;--border:#1e2d3d;
    --accent:#00d4ff;--green:#00ff9d;--red:#ff3b30;--yellow:#ffd60a;
    --text:#c8d6e5;--muted:#3d5166;
    --lock-col:#00d4ff;--noise-col:#ff6b35;
    --font-ui:'Share Tech Mono',monospace;--font-head:'Teko',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:12px;
    min-height:100dvh;display:flex;flex-direction:column;padding:14px;gap:10px}
  header{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .lock-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:16px;
    box-shadow:0 0 12px rgba(0,212,255,.4)}
  h1{font-family:var(--font-head);font-size:26px;font-weight:600;letter-spacing:2px;color:#fff;line-height:1}
  h1 span{color:var(--accent)}
  .version{margin-left:auto;color:var(--muted);font-size:10px;text-align:right;line-height:1.5}
  .status-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:10px}
  .si{display:flex;justify-content:space-between}
  .si .k{color:var(--muted)}.si .v{color:var(--accent);font-weight:bold}
  .si .v.ok{color:var(--green)}.si .v.er{color:var(--red)}.si .v.wa{color:var(--yellow)}
  #btn{width:100%;padding:20px;font-family:var(--font-head);font-size:22px;font-weight:600;
    letter-spacing:3px;border:2px solid var(--border);border-radius:10px;
    background:var(--surface);color:var(--muted);cursor:not-allowed;transition:all .25s}
  #btn.ready{border-color:var(--accent);color:var(--accent);cursor:pointer;
    box-shadow:0 0 20px rgba(0,212,255,.15)}
  #btn.recording{border-color:var(--red);color:var(--red);
    animation:pb 1.6s ease-in-out infinite}
  @keyframes pb{
    0%,100%{box-shadow:0 0 20px rgba(255,59,48,.2)}
    50%{box-shadow:0 0 35px rgba(255,59,48,.4)}}
  .meter-wrap{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted)}
  .meter-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
  .meter-fill{height:100%;width:0%;background:var(--green);border-radius:3px;transition:width .06s}
  .meter-fill.hot{background:var(--yellow)}.meter-fill.clip{background:var(--red)}
  .scores{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .score-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:14px 12px 10px;text-align:center;transition:border-color .3s,box-shadow .3s;
    position:relative;overflow:hidden}
  .score-card::after{content:'';position:absolute;bottom:0;left:0;right:0;
    height:3px;background:var(--border);transition:background .3s}
  .score-card.al{border-color:var(--lock-col);box-shadow:0 0 18px rgba(0,212,255,.2)}
  .score-card.al::after{background:var(--lock-col)}
  .score-card.an{border-color:var(--noise-col);box-shadow:0 0 18px rgba(255,107,53,.2)}
  .score-card.an::after{background:var(--noise-col)}
  .score-label{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
  .score-value{font-family:var(--font-head);font-size:48px;font-weight:600;
    line-height:1;color:var(--muted);transition:color .3s}
  .al .score-value{color:var(--lock-col)}.an .score-value{color:var(--noise-col)}
  .score-bar-wrap{margin-top:8px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .score-bar-fill{height:100%;width:0%;border-radius:2px;transition:width .25s ease}
  .cl .score-bar-fill{background:var(--lock-col)}.cn .score-bar-fill{background:var(--noise-col)}
  .verdict{text-align:center;padding:12px;border-radius:8px;
    font-family:var(--font-head);font-size:20px;font-weight:600;letter-spacing:3px;
    background:var(--surface);border:1px solid var(--border);color:var(--muted);
    transition:all .3s;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px}
  .verdict.lock{background:rgba(0,212,255,.08);border-color:var(--lock-col);color:var(--lock-col)}
  .verdict.noise{background:rgba(255,107,53,.08);border-color:var(--noise-col);color:var(--noise-col)}
  .log-header{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:10px;padding:0 2px}
  .log-clear{background:none;border:1px solid var(--border);color:var(--muted);
    font-family:var(--font-ui);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:4px}
  #log{background:#050810;border:1px solid var(--border);border-radius:8px;
    height:200px;overflow-y:auto;padding:8px 10px;font-size:10px;line-height:1.7}
  #log .ok{color:#3fb950}#log .wa{color:var(--yellow)}
  #log .er{color:var(--red)}#log .in{color:var(--muted)}#log .re{color:var(--accent)}
</style>
<script src="./edge-impulse-standalone.js?v=6"></script>
<script src="./run-impulse.js?v=6"></script>
</head>
<body>

<header>
  <div class="lock-icon">🔒</div>
  <div><h1>LOCK<span>SCAN</span></h1></div>
  <div class="version">v6 FINAL<br>48kHz Fixed</div>
</header>

<div class="status-bar">
  <div class="si"><span class="k">DEVICE SR</span><span class="v" id="s-dsr">---</span></div>
  <div class="si"><span class="k">MODEL SR</span><span class="v" id="s-msr">---</span></div>
  <div class="si"><span class="k">WINDOW</span><span class="v" id="s-win">---</span></div>
  <div class="si"><span class="k">ENGINE</span><span class="v" id="s-eng">LOADING</span></div>
</div>

<button id="btn" disabled onclick="startRecording()">LOADING ENGINE...</button>

<div class="meter-wrap">
  <span>IN</span>
  <div class="meter-bar"><div class="meter-fill" id="meter"></div></div>
  <span id="peak-val">0.000</span>
</div>

<div class="scores" id="score-cards"></div>
<div class="verdict" id="verdict">WAITING FOR INPUT</div>

<div class="log-header">
  <span>▸ SYSTEM LOG</span>
  <button class="log-clear" onclick="clearLog()">CLEAR</button>
</div>
<div id="log"></div>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// モデル設定（props から自動取得するので変更不要）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let MODEL_SR    = 48000;  // getProperties().frequency で上書き
let WINDOW_SIZE = 48000;  // getProperties().frame_sample_count で上書き
let SLIDE_SIZE  = 12000;  // getProperties().slice_size で上書き

const PROC_BUF = 4096;
const LOG_MAX  = 150;

const $ = id => document.getElementById(id);
let logN = 0;

function log(msg, cls='ok'){
  const box=$('log');
  const t=new Date().toLocaleTimeString('ja-JP',{hour12:false});
  const d=document.createElement('div');
  d.className=cls; d.textContent=`[${t}] ${msg}`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
  if(++logN>LOG_MAX){box.removeChild(box.firstChild);logN--;}
}
function clearLog(){$('log').innerHTML='';logN=0;}
function setStat(id,v,c=''){const e=$(id);e.textContent=v;e.className='v'+(c?' '+c:'');}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// スコアカード
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let knownLabels=[];

function lc(label){
  const u=label.toLowerCase();
  return u.includes('lock')?'lock':u.includes('noise')?'noise':'other';
}

function buildCards(labels){
  knownLabels=labels;
  $('score-cards').innerHTML=labels.map(lb=>{
    const c=lc(lb);
    return `<div class="score-card c${c[0]}" id="card-${lb}">
      <div class="score-label">${lb}</div>
      <div class="score-value" id="val-${lb}">--%</div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="bar-${lb}"></div>
      </div>
    </div>`;
  }).join('');
}

function updateCards(results){
  const w=results.reduce((a,b)=>a.value>b.value?a:b);
  results.forEach(r=>{
    const p=(r.value*100).toFixed(1);
    const ve=$(`val-${r.label}`), be=$(`bar-${r.label}`), ce=$(`card-${r.label}`);
    if(!ve) return;
    ve.textContent=p+'%';
    be.style.width=p+'%';
    ce.classList.remove('al','an');
    if(r.label===w.label) ce.classList.add(lc(r.label)==='lock'?'al':'an');
  });
  const vd=$('verdict'), wc=lc(w.label);
  vd.className='verdict '+wc;
  vd.innerHTML=(wc==='lock'?'🔒':'🔊')+' '
    +w.label.toUpperCase()
    +`<small style="font-size:14px;opacity:.7"> ${(w.value*100).toFixed(1)}%</small>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let classifier=null;

window.addEventListener('load', async()=>{
  log('▶ 初期化開始...');
  try{
    classifier=new EdgeImpulseClassifier();
    await classifier.init();

    const props = typeof classifier.getProperties==='function'
      ? classifier.getProperties() : {};

    log('✅ 初期化成功');
    log('props='+JSON.stringify(props),'in');

    // ★ モデルの実際の値で上書き（今回の核心）
    MODEL_SR    = props.frequency          || 48000;
    WINDOW_SIZE = props.frame_sample_count || 48000;
    SLIDE_SIZE  = props.slice_size         || Math.round(WINDOW_SIZE * 0.25);

    const labels = props.labels || props.model_output_names || [];

    setStat('s-msr', MODEL_SR+'Hz',    'ok');
    setStat('s-win', WINDOW_SIZE+'smp','ok');
    setStat('s-eng', 'READY',          'ok');

    if(labels.length>0){
      buildCards(labels);
      log('ラベル: '+labels.join(' / '),'in');
    }

    const btn=$('btn');
    btn.disabled=false;
    btn.textContent='▶  START RECORDING';
    btn.className='ready';
  }catch(e){
    log('❌ 初期化失敗: '+e.message,'er');
    setStat('s-eng','ERROR','er');
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 録音開始
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let sampleBuf=[], isClassifying=false, isRecording=false;

async function startRecording(){
  if(isRecording||!classifier) return;
  const btn=$('btn'); btn.disabled=true;
  try{
    // Safari Fix: sampleRate 指定なし → 実機のデフォルト（48000）をそのまま使う
    const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended'){
      await audioCtx.resume();
      log('AudioContext resume()','in');
    }

    const deviceSR=audioCtx.sampleRate;
    setStat('s-dsr', deviceSR+'Hz', deviceSR===MODEL_SR?'ok':'wa');
    log(`DEVICE SR: ${deviceSR}Hz / MODEL SR: ${MODEL_SR}Hz`);

    // デバイスSRとモデルSRが一致 → リサンプリング不要
    if(deviceSR!==MODEL_SR){
      log(`⚠ SRミスマッチ: リサンプリングを適用 (${deviceSR}→${MODEL_SR})`,'wa');
    }

    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    log('✅ マイク取得成功');

    const src  = audioCtx.createMediaStreamSource(stream);
    const proc = audioCtx.createScriptProcessor(PROC_BUF,1,1);

    // デバイスSRで何サンプル集めればモデルの1窓になるか
    const targetSamples = Math.round(WINDOW_SIZE * deviceSR / MODEL_SR);
    const slideStep     = Math.round(SLIDE_SIZE  * deviceSR / MODEL_SR);
    log(`窓: ${targetSamples}smp / スライド: ${slideStep}smp`,'in');

    proc.onaudioprocess=(e)=>{
      const chunk=e.inputBuffer.getChannelData(0);
      // レベルメーター
      let pk=0;
      for(let i=0;i<chunk.length;i++){const a=Math.abs(chunk[i]);if(a>pk)pk=a;}
      const pct=Math.min(100,pk*200);
      const fill=$('meter');
      fill.style.width=pct+'%';
      fill.className='meter-fill'+(pct>90?' clip':pct>65?' hot':'');
      $('peak-val').textContent=pk.toFixed(3);

      for(let i=0;i<chunk.length;i++) sampleBuf.push(chunk[i]);

      if(sampleBuf.length>=targetSamples&&!isClassifying){
        const win=new Float32Array(sampleBuf.slice(0,targetSamples));
        sampleBuf=sampleBuf.slice(slideStep);
        // Safari Fix: オーディオスレッドから切り離す
        setTimeout(()=>runInference(win,deviceSR),0);
      }
    };

    src.connect(proc);
    proc.connect(audioCtx.destination);
    isRecording=true;
    btn.textContent='⏺  RECORDING...';
    btn.className='recording';
    log('🎤 監視開始');
  }catch(e){
    log('❌ 録音エラー: '+e.message,'er');
    btn.disabled=false;
    btn.textContent='▶  RETRY';
    btn.className='ready';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 推論
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function resample(input, fromSR, toSR){
  if(fromSR===toSR) return input;
  const ratio=fromSR/toSR, n=Math.round(input.length/ratio), o=new Float32Array(n);
  for(let i=0;i<n;i++){
    const p=i*ratio,k=Math.floor(p),f=p-k;
    o[i]=(k+1<input.length)?input[k]*(1-f)+input[k+1]*f:input[k];
  }
  return o;
}

async function runInference(rawChunk, deviceSR){
  isClassifying=true;
  try{
    // リサンプリング（SR が一致する場合はそのまま）
    const data = resample(rawChunk, deviceSR, MODEL_SR);
    const peak = Math.max(...data.map(Math.abs));

    if(peak<0.001){log('⚠ 無音 — マイクを確認してください','wa');return;}
    log(`classify() ${data.length}smp peak=${peak.toFixed(4)}`,'in');

    // ★ Array.from() で通常配列に変換（TypedArrayのまま渡すとSafariでerr -24）
    const inputArray=Array.from(data);

    let res;
    try{
      res=classifier.classify(inputArray);
    }catch(e1){
      // フォールバック: Float32Array で再試行
      log('Array失敗→Float32再試行: '+e1.message,'wa');
      res=classifier.classify(data);
    }

    log('RAW: '+JSON.stringify(res),'in');

    // 結果パース（SDK バージョン対応）
    let results=null;
    if(Array.isArray(res?.results))
      results=res.results.map(r=>({label:r.label,value:r.value}));
    else if(res?.classification&&typeof res.classification==='object')
      results=Object.entries(res.classification).map(([l,v])=>({label:l,value:v}));
    else if(typeof res==='object'&&res!==null){
      const f=Object.entries(res)
        .filter(([,v])=>typeof v==='number')
        .map(([l,v])=>({label:l,value:v}));
      if(f.length) results=f;
    }

    if(!results||!results.length){
      log('⚠ 結果形式不明: '+JSON.stringify(res),'wa');
      return;
    }

    if(!knownLabels.length) buildCards(results.map(r=>r.label));
    updateCards(results);

    results.sort((a,b)=>b.value-a.value).forEach(r=>{
      const bar='█'.repeat(Math.round(r.value*20)).padEnd(20,'░');
      log(`  ${r.label.padEnd(8)} ${(r.value*100).toFixed(1).padStart(5)}% |${bar}|`,'re');
    });

  }catch(e){
    log('❌ 推論エラー: '+e.message,'er');
  }finally{
    isClassifying=false;
  }
}
</script>
</body>
</html>
