<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL DEBUG</title>
    <style>
        /* 反映確認のため、背景を赤にします */
        body { background: #ff0000; color: white; font-family: monospace; padding: 10px; font-size: 12px; }
        .log { background: black; color: #0f0; height: 400px; overflow: auto; padding: 10px; border: 2px solid white; margin-top: 10px; }
        .btn { width: 100%; padding: 25px; font-size: 18px; font-weight: bold; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h2>【デバッグ最終段階】</h2>
    <button id="btn" class="btn" onclick="run()" disabled>AIエンジンロード中...</button>
    <div id="log" class="log">ここに全ての動きを記録します...</div>

<script>
    const logger = (m) => { document.getElementById('log').innerHTML += `<div>${new Date().toLocaleTimeString()}: ${m}</div>`; };
    let classifier, sampleBuf = [];

    window.onload = async () => {
        try {
            logger("1. エンジン初期化開始...");
            classifier = new EdgeImpulseClassifier();
            await classifier.init();
            logger("2. ✅ 初期化成功！");
            document.getElementById('btn').disabled = false;
            document.getElementById('btn').innerText = "マイク録音開始";
        } catch (e) { logger("❌ 初期化エラー: " + e.message); }
    };

    async function run() {
        try {
            logger("3. マイクアクセス開始...");
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);
            
            source.connect(processor);
            processor.connect(audioCtx.destination);

            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                for (let i = 0; i < input.length; i++) sampleBuf.push(input[i]);

                if (sampleBuf.length >= 16000) {
                    logger("4. 1秒分のデータ（16000件）到達。計算します...");
                    const rawData = new Float32Array(sampleBuf.slice(0, 16000));
                    sampleBuf = sampleBuf.slice(4000); // 0.25秒分ずらす

                    try {
                        // classifyを呼び出し、結果をそのままログに出す
                        const res = classifier.classify(rawData);
                        logger("5. 🎉 判定成功: " + JSON.stringify(res.results || res.classification || res));
                    } catch (err) {
                        logger("❌ 推論実行エラー: " + err.message);
                    }
                }
            };
            logger("6. 🎤 録音ループ開始...");
        } catch (e) { logger("❌ マイクエラー: " + e.message); }
    }
</script>
</body>
</html>
