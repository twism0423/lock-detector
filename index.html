<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>内鍵音判別 AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');
    :root { --bg: #080810; --surface: #0f0f1a; --card: #13131f; --border: #1a1a30; --lock: #00ffaa; --noise: #ff3366; --idle: #2a2a4a; --text: #d0d0e8; --dim: #4a4a70; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,255,170,0.04) 0%, transparent 70%), linear-gradient(rgba(0,255,170,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,170,0.02) 1px, transparent 1px); background-size: auto, 50px 50px, 50px 50px; }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 430px; padding: 20px 16px 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .header { text-align: center; } .header h1 { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900; letter-spacing: 0.2em; background: linear-gradient(135deg, var(--lock), #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; } .header .sub { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--dim); margin-top: 4px; }
    .ring-wrap { position: relative; width: 190px; height: 190px; } .ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); } .ring-track { fill: none; stroke: var(--border); stroke-width: 10; } .ring-fill { fill: none; stroke: var(--idle); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 534; stroke-dashoffset: 534; transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease; } .ring-inner { position: absolute; inset: 18px; background: var(--surface); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; } .ring-emoji { font-size: 1.8rem; } .ring-label { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 900; color: var(--idle); } .ring-pct { font-size: 0.62rem; color: var(--dim); }
    .card { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; } .card-label { font-size: 0.58rem; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 6px; } canvas { width: 100% !important; height: 60px !important; display: block; border-radius: 4px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--dim); } .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--idle); } .recording .dot { background: var(--lock); animation: blink 1s infinite; } @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; background: linear-gradient(135deg, #00aa66, var(--lock)); color: #000; } .btn:disabled { opacity: 0.3; } .btn.stop { background: var(--noise); color: #fff; }
    .nn-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; } .nn-name { font-size: 0.7rem; width: 50px; } .nn-track { flex: 1; height: 10px; background: var(--surface); border-radius: 5px; overflow: hidden; } .nn-fill { height: 100%; transition: width 0.2s; }
  </style>

  <script src="./edge-impulse-standalone.js?v=1"></script>
  <script src="./run-impulse.js?v=1"></script>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <div class="header">
    <h1>LOCK DETECTOR</h1>
    <div class="sub">AI WASM ENGINE — iPad Air M2</div>
  </div>

  <div class="ring-wrap" id="ringWrap">
    <div class="ring-inner">
      <div class="ring-emoji" id="ringEmoji">🔒</div>
      <div class="ring-label" id="ringLabel">READY</div>
      <div class="ring-pct" id="ringPct">--.--%</div>
    </div>
    <svg class="ring-svg" viewBox="0 0 190 190">
      <circle class="ring-track" cx="95" cy="95" r="85"/>
      <circle class="ring-fill" id="ringFill" cx="95" cy="95" r="85"/>
    </svg>
  </div>

  <div class="card">
    <div class="card-label">WAVEFORM</div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="card">
    <div class="card-label">AI OUTPUT</div>
    <div class="nn-row"><div class="nn-name">LOCK</div><div class="nn-track"><div id="barLock" class="nn-fill" style="background:var(--lock);width:0%"></div></div></div>
    <div class="nn-row"><div class="nn-name">NOISE</div><div class="nn-track"><div id="barNoise" class="nn-fill" style="background:var(--noise);width:0%"></div></div></div>
  </div>

  <div class="status" id="statusBar"><span class="dot"></span><span id="statusTxt">初期化中...</span></div>
  <button class="btn" id="mainBtn" onclick="toggle()" disabled>🎙 録音開始</button>
</div>

<script>
let classifier, isReady = false, isRecording = false;
let audioCtx, analyser, processor, sampleBuf = [];

// 起動処理
window.onload = async () => {
    try {
        await new Promise(r => setTimeout(r, 500));
        if (typeof EdgeImpulseClassifier === 'undefined') throw new Error("JS読み込み失敗");
        classifier = new EdgeImpulseClassifier();
        await classifier.init();
        isReady = true;
        document.getElementById('statusTxt').textContent = '準備完了';
        document.getElementById('mainBtn').disabled = false;
    } catch (e) {
        document.getElementById('statusTxt').textContent = 'エラー: ' + e.message;
        alert("起動エラー: " + e.message + "\nファイルがGitHub上で正しく配置されているか再確認してください。");
    }
};

async function toggle() {
    if (!isReady) return;
    if (isRecording) {
        isRecording = false;
        document.getElementById('mainBtn').textContent = '🎙 録音開始';
        document.getElementById('mainBtn').className = 'btn';
        if (audioCtx) audioCtx.close();
    } else {
        await start();
    }
}

async function start() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        
        source.connect(analyser);
        source.connect(processor);
        processor.connect(audioCtx.destination);
        
        processor.onaudioprocess = (e) => {
            const data = Array.from(e.inputBuffer.getChannelData(0));
            sampleBuf.push(...data);
            if (sampleBuf.length >= 16000) {
                const res = classifier.classify(sampleBuf.splice(0, 16000));
                updateUI(res.results);
            }
        };
        isRecording = true;
        document.getElementById('mainBtn').textContent = '■ 停止';
        document.getElementById('mainBtn').className = 'btn stop';
        draw();
    } catch (e) { alert(e.message); }
}

function updateUI(results) {
    let lock = 0, noise = 0;
    results.forEach(r => {
        if (r.label.toLowerCase() === 'lock') lock = r.value;
        if (r.label.toLowerCase() === 'noise') noise = r.value;
    });
    document.getElementById('barLock').style.width = (lock * 100) + '%';
    document.getElementById('barNoise').style.width = (noise * 100) + '%';
    document.getElementById('ringPct').textContent = ((lock > noise ? lock : noise) * 100).toFixed(1) + '%';
    document.getElementById('ringLabel').textContent = lock > noise ? 'LOCK' : 'NOISE';
    document.getElementById('ringFill').style.strokeDashoffset = 534 * (1 - (lock > noise ? lock : noise));
}

function draw() {
    if (!isRecording) return;
    requestAnimationFrame(draw);
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#00ffaa';
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
        const x = i * (canvas.width / data.length);
        const y = (data[i] / 255.0) * canvas.height;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
