<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI DEBUG MONITOR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; font-size: 12px; }
        .box { border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .log { background: #111; height: 150px; overflow-y: auto; padding: 5px; color: #8f8; font-size: 10px; border: 1px solid #333; }
        .btn { width: 100%; padding: 20px; background: #0f0; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; }
        .btn:disabled { background: #050; color: #0a0; }
        .score { font-size: 18px; color: #fff; display: flex; justify-content: space-between; margin: 5px 0; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <h3>AI SENSOR DEBUG</h3>
    
    <div class="box">
        <div>INPUT LEVEL: <span id="peak">0.0000</span></div>
        <canvas id="canvas" style="width:100%; height:40px; background:#111;"></canvas>
    </div>

    <div class="box">
        <div style="margin-bottom:10px;">AI CLASSIFICATION</div>
        <div id="results">
            <div class="score">Waiting...</div>
        </div>
    </div>

    <div class="box">
        <div>SYSTEM LOG</div>
        <div id="log" class="log"></div>
    </div>

    <button id="btn" class="btn" onclick="toggle()" disabled>INITIALIZING...</button>

<script>
let classifier, audioCtx, processor, sampleBuf = [];
let isReady = false, isRecording = false;

function print(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `> ${msg}<br>`;
    l.scrollTop = l.scrollHeight;
}

window.onload = async () => {
    try {
        print("エンジン初期化開始...");
        classifier = new EdgeImpulseClassifier();
        await classifier.init();
        const props = classifier.getProperties();
        print(`モデル情報: ${props.sensor_name} / ${props.frequency}Hz`);
        
        isReady = true;
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').innerText = 'START';
    } catch (e) {
        print("❌ 初期化エラー: " + e.message);
    }
};

async function toggle() {
    if (isRecording) {
        isRecording = false;
        document.getElementById('btn').innerText = 'START';
        if (audioCtx) audioCtx.close();
    } else {
        start();
    }
}

async function start() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        
        source.connect(analyser);
        processor.connect(audioCtx.destination);
        source.connect(processor);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            let peak = 0;
            for (let i = 0; i < input.length; i++) {
                // Edge Impulseの標準形式(-1.0 to 1.0)でバッファに保存
                sampleBuf.push(input[i]);
                if (Math.abs(input[i]) > peak) peak = Math.abs(input[i]);
            }
            document.getElementById('peak').innerText = peak.toFixed(4);

            if (sampleBuf.length >= 16000) {
                const raw = sampleBuf.slice(-16000);
                sampleBuf.splice(0, 8000); // 0.5秒分スライド

                try {
                    // 推論。結果を raw オブジェクトとしてログに出す
                    const res = classifier.classify(raw);
                    updateUI(res);
                } catch (err) {
                    print("推論失敗: " + err.message);
                }
            }
        };

        isRecording = true;
        document.getElementById('btn').innerText = 'STOP';
        print("モニタリング中...");
        
        // 波形描画
        const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
        const draw = () => {
            if (!isRecording) return;
            requestAnimationFrame(draw);
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,cvs.width,cvs.height);
            ctx.strokeStyle = '#0f0'; ctx.beginPath();
            for(let i=0; i<data.length; i++) {
                const x = i * (cvs.width / data.length);
                const y = (data[i]+1)/2 * cvs.height;
                i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke();
        };
        draw();
    } catch (e) { print("マイク起動失敗: " + e.message); }
}

function updateUI(res) {
    const container = document.getElementById('results');
    const results = res.results || res.classification || [];
    
    // AIが返している生のデータをログに出力
    print(`Result: ${JSON.stringify(results).substring(0, 50)}...`);

    if (Array.isArray(results)) {
        container.innerHTML = results.map(r => `
            <div class="score">
                <span>${r.label.toUpperCase()}</span>
                <span>${(r.value * 100).toFixed(1)}%</span>
            </div>
        `).join('');
    } else {
        // オブジェクト形式で返ってくる場合
        container.innerHTML = Object.keys(results).map(key => `
            <div class="score">
                <span>${key.toUpperCase()}</span>
                <span>${(results[key] * 100).toFixed(1)}%</span>
            </div>
        `).join('');
    }
}
</script>
</body>
</html>
