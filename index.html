<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI LOCK DETECTOR PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        :root { --bg: #05050a; --accent: #00ffaa; --warn: #ff3366; --panel: #0f0f1f; --text: #d0d0e8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent); text-align: center; margin-bottom: 20px; letter-spacing: 3px; }
        .monitor { background: var(--panel); border: 1px solid #1a1a30; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .val { font-family: 'Orbitron', monospace; font-size: 1.1rem; color: #fff; }
        canvas { width: 100%; height: 60px; background: #000; border-radius: 6px; margin-top: 10px; }
        .res-row { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; overflow: hidden; border: 1px solid #1a1a30; }
        .res-bar { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); opacity: 0.2; transition: width 0.1s linear; }
        .res-info { position: relative; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-family: 'Orbitron'; background: var(--accent); color: #000; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn.stop { background: var(--warn); color: #fff; }
    </style>
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>
</head>
<body>
    <div class="container">
        <h1>LOCK DETECTOR</h1>
        <div class="monitor">
            <div style="font-size: 0.6rem; color: #505080; margin-bottom: 5px;">INPUT PEAK LEVEL</div>
            <div id="peakVal" class="val">0.0000</div>
            <canvas id="waveCanvas"></canvas>
        </div>
        <div id="results" class="results">
            </div>
        <button id="mainBtn" class="btn" onclick="toggle()" disabled>INITIALIZING...</button>
    </div>

<script>
let classifier, audioCtx, processor, sampleBuf = [];
let isReady = false, isRecording = false;

window.onload = async () => {
    try {
        classifier = new EdgeImpulseClassifier();
        await classifier.init();
        isReady = true;
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = 'START MONITORING';
    } catch (e) { alert("Init Error: " + e.message); }
};

async function toggle() {
    if (!isReady) return;
    if (isRecording) {
        isRecording = false;
        document.getElementById('mainBtn').innerText = 'START MONITORING';
        document.getElementById('mainBtn').classList.remove('stop');
        if (audioCtx) audioCtx.close();
    } else {
        await start();
    }
}

async function start() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        source.connect(analyser); processor.connect(audioCtx.destination); source.connect(processor);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            let peak = 0;
            for (let i = 0; i < input.length; i++) {
                sampleBuf.push(input[i]);
                if (Math.abs(input[i]) > peak) peak = Math.abs(input[i]);
            }
            document.getElementById('peakVal').innerText = peak.toFixed(4);

            if (sampleBuf.length >= 16000) {
                const raw = sampleBuf.slice(-16000);
                sampleBuf.splice(0, 4000);
                const res = classifier.classify(new Float32Array(raw));
                if (res && (res.results || res.classification)) {
                    updateUI(res.results || res.classification);
                }
            }
        };
        isRecording = true;
        document.getElementById('mainBtn').innerText = 'STOP';
        document.getElementById('mainBtn').classList.add('stop');
        
        const cvs = document.getElementById('waveCanvas'), ctx = cvs.getContext('2d');
        const draw = () => {
            if (!isRecording) return;
            requestAnimationFrame(draw);
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            ctx.fillStyle = '#05050a'; ctx.fillRect(0,0,cvs.width,cvs.height);
            ctx.strokeStyle = '#00ffaa'; ctx.beginPath();
            for(let i=0; i<data.length; i++) {
                const x = i * (cvs.width / data.length);
                const y = (data[i]+1)/2 * cvs.height;
                i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke();
        };
        draw();
    } catch (e) { alert(e.message); }
}

function updateUI(results) {
    const container = document.getElementById('results');
    container.innerHTML = '';
    const items = Array.isArray(results) ? results : Object.keys(results).map(key => ({label: key, value: results[key]}));
    items.forEach(r => {
        const pct = (r.value * 100).toFixed(1);
        const row = document.createElement('div');
        row.className = 'res-row';
        row.innerHTML = `<div class="res-bar" style="width: ${pct}%"></div>
            <div class="res-info"><span>${r.label.toUpperCase()}</span><span>${pct}%</span></div>`;
        container.appendChild(row);
    });
}
</script>
</body>
</html>
